server:
  port: 8080

spring:
  application:
    name: api-gateway-test
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/accounts/**
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/transactions/**
        - id: analytics-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/analytics/**

jwt:
  secret: dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1oczI1Ng==

gateway:
  public-paths:
    - /api/auth/register
    - /api/auth/login
    - /api/auth/refresh

logging:
  level:
    root: WARN
    com.financeflow.gateway: DEBUG
