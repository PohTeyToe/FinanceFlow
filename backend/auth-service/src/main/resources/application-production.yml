spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:financeflow}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.financeflow: INFO
    org.springframework.security: WARN
