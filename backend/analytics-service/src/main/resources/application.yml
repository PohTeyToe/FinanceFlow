server:
  port: 8084

spring:
  application:
    name: analytics-service
  datasource:
    url: jdbc:postgresql://localhost:5432/financeflow
    username: financeflow
    password: financeflow_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

jwt:
  # Base64 encoded secret key (must match auth-service)
  secret: ${JWT_SECRET:eW91ci0yNTYtYml0LXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHktY2hhbmdlLWluLXByb2R1Y3Rpb24=}

logging:
  level:
    com.financeflow: DEBUG
