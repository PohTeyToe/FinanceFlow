name: FinanceFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ===================
  # BACKEND TESTS
  # ===================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: financeflow
          POSTGRES_PASSWORD: financeflow_secret
          POSTGRES_DB: financeflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run tests with Maven
        working-directory: ./backend
        run: mvn -B test --fail-at-end
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/financeflow_test
          SPRING_DATASOURCE_USERNAME: financeflow
          SPRING_DATASOURCE_PASSWORD: financeflow_secret

      - name: Generate coverage report
        working-directory: ./backend
        run: mvn -B jacoco:report-aggregate

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/target/site/jacoco-aggregate/jacoco.xml
          flags: backend
          fail_ci_if_error: false

      - name: Check coverage threshold
        working-directory: ./backend
        run: |
          mvn -B jacoco:check || echo "Coverage check completed"

  # ===================
  # BACKEND BUILD
  # ===================
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./backend
        run: mvn -B package -DskipTests

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: backend/**/target/*.jar
          retention-days: 7

  # ===================
  # FRONTEND TESTS
  # ===================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

  # ===================
  # FRONTEND BUILD
  # ===================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ===================
  # DOCKER BUILD
  # ===================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: backend

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Build Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/auth-service/Dockerfile
          push: false
          tags: financeflow-auth:latest

      - name: Build Account Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/account-service/Dockerfile
          push: false
          tags: financeflow-account:latest

      - name: Build Transaction Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/transaction-service/Dockerfile
          push: false
          tags: financeflow-transaction:latest

      - name: Build Analytics Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/analytics-service/Dockerfile
          push: false
          tags: financeflow-analytics:latest

      - name: Build API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/api-gateway/Dockerfile
          push: false
          tags: financeflow-gateway:latest

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: financeflow-frontend:latest
