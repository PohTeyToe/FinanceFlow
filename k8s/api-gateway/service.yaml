apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: financeflow
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: financeflow
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
  selector:
    app: api-gateway
